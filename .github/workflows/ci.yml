name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forge-test:
    name: Forge Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge soldeer update

      - name: Build
        run: forge build

      - name: Test
        run: forge test

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests (skip proof tests that need circuit artifacts)
        run: npx vitest run --testPathIgnorePatterns="proof"

  sp1-contracts:
    name: SP1 Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sp1-batch/contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build

      - name: Test
        run: forge test
