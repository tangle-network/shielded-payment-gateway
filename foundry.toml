[profile.default]
bytecode_hash = "none"
fuzz = { runs = 1_000 }
gas_reports = ["*"]
libs = ["dependencies"]
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]
solc = "0.8.26"
evm_version = "cancun"
via_ir = true
allow_internal_expect_revert = true

[profile.fast]
via_ir = true
optimizer = false
sparse_mode = true
gas_reports = []
fuzz = { runs = 256 }

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[invariant]
fail_on_revert = false
runs = 256
depth = 120

[dependencies]
forge-std = "1.9.4"
"@openzeppelin-contracts" = "5.1.0"
